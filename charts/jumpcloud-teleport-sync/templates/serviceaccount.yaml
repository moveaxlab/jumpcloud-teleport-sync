apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "jumpcloud-teleport-sync.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "jumpcloud-teleport-sync.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
