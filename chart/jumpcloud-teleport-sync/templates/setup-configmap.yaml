{{- if .Values.setup.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "jumpcloud-teleport-sync.fullname" . }}-setup
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "jumpcloud-teleport-sync.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
data:
  setup.sh: |
    #!/bin/sh
    set -eu

    FULLNAME="{{ include "jumpcloud-teleport-sync.fullname" . }}"
    NAMESPACE="{{ .Release.Namespace }}"
    SA_NAME="{{ include "jumpcloud-teleport-sync.serviceAccountName" . }}"
    AUTH_SELECTOR="{{ .Values.setup.teleportAuthSelector }}"
    AUTH_CONTAINER="{{ .Values.setup.teleportAuthContainer }}"

    BOT_NAME="${FULLNAME}-bot"
    ROLE_NAME="${FULLNAME}-bot-role"

    echo "==> Finding Teleport auth pod..."
    AUTH_POD=$(kubectl get pods -n "${NAMESPACE}" -l "${AUTH_SELECTOR}"       --field-selector=status.phase=Running -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)

    if [ -z "${AUTH_POD}" ]; then
      echo "ERROR: No running Teleport auth pod found with selector: ${AUTH_SELECTOR}"
      exit 1
    fi
    echo "    Found: ${AUTH_POD}"

    tctl_exec() {
      kubectl exec -n "${NAMESPACE}" "${AUTH_POD}" -c "${AUTH_CONTAINER}" -- tctl "$@"
    }

    # --- 1. Create or update the bot role (idempotent via create -f) ---
    echo "==> Creating/updating role: ${ROLE_NAME}"
    cat <<ROLE_EOF | kubectl exec -i -n "${NAMESPACE}" "${AUTH_POD}" -c "${AUTH_CONTAINER}" -- tctl create -f
    kind: role
    version: v7
    metadata:
      name: ${ROLE_NAME}
    spec:
      allow:
        rules:
          - resources: [user]
            verbs: [list, read, create, update, delete]
          - resources: [token]
            verbs: [list, read, create]
          - resources: [lock]
            verbs: [list, read, create, update]
          - resources: [reset_password_token]
            verbs: [create]
    ROLE_EOF

    # --- 2. Create or update the join token (idempotent via create -f) ---
    echo "==> Creating/updating join token: ${BOT_NAME}"
    cat <<TOKEN_EOF | kubectl exec -i -n "${NAMESPACE}" "${AUTH_POD}" -c "${AUTH_CONTAINER}" -- tctl create -f
    kind: token
    version: v2
    metadata:
      name: ${BOT_NAME}
    spec:
      roles: [Bot]
      join_method: kubernetes
      bot_name: ${BOT_NAME}
      kubernetes:
        type: in_cluster
        allow:
          - service_account: "${NAMESPACE}:${SA_NAME}"
    TOKEN_EOF

    # --- 3. Create bot if it doesn't exist (tctl bots add is NOT idempotent) ---
    echo "==> Checking if bot exists: ${BOT_NAME}"
    if tctl_exec bots ls 2>/dev/null | grep -q "${BOT_NAME}"; then
      echo "    Bot already exists, skipping creation"
    else
      echo "    Creating bot: ${BOT_NAME}"
      tctl_exec bots add "${BOT_NAME}"         --roles="${ROLE_NAME}"         --token="${BOT_NAME}"         --logins=""
    fi

    echo "==> Setup complete!"
{{- end }}
