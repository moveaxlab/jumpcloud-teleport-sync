# -- JumpCloud settings
jumpcloud:
  # -- JumpCloud group name to sync from
  groupName: ""
  # -- JumpCloud service account client ID
  clientID: ""
  # -- JumpCloud service account client secret (will be stored in a Secret)
  clientSecret: ""
  # -- JumpCloud organization ID
  orgID: ""
  # -- Use an existing secret for JumpCloud credentials instead of creating one
  # The secret must have keys: JUMPCLOUD_CLIENT_ID, JUMPCLOUD_CLIENT_SECRET, JUMPCLOUD_ORG_ID
  existingSecret: ""

# -- Teleport auth server address (in-cluster)
teleportAddr: "teleport-auth.teleport.svc.cluster.local:3025"

# -- Comma-separated list of Teleport roles to assign to synced users
teleportDefaultRoles: "access"

# -- Teleport image for the tbot sidecar container
teleportImage:
  repository: public.ecr.aws/gravitational/teleport-distroless
  tag: "18"

# -- Sync job image
image:
  repository: ghcr.io/moveaxlab/jumpcloud-teleport-sync
  tag: 0.1.0
  pullPolicy: IfNotPresent

# -- Sync schedule (cron expression, used by the internal scheduler)
schedule: "*/15 * * * *"

# -- Enable dry run mode (logs changes without applying)
dryRun: false

# -- SMTP settings for sending invite emails (designed for AWS SES)
smtp:
  # -- Enable sending invite emails on user creation
  enabled: false
  # -- SMTP server hostname (e.g. email-smtp.eu-west-1.amazonaws.com)
  host: ""
  # -- SMTP server port (587 for STARTTLS)
  port: 587
  # -- SMTP username (AWS SES SMTP credential)
  username: ""
  # -- SMTP password (AWS SES SMTP credential)
  password: ""
  # -- Sender email address (must be verified in SES)
  from: ""
  # -- Use an existing secret for SMTP credentials instead of creating one
  # The secret must have keys: SMTP_USERNAME, SMTP_PASSWORD
  existingSecret: ""

# -- Pod resources for the tbot sidecar container
tbotResources:
  requests:
    cpu: 25m
    memory: 32Mi
  limits:
    cpu: 100m
    memory: 64Mi

# -- Pod resources for the sync container
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

# -- Image pull secrets
imagePullSecrets: []

# -- Pod annotations
podAnnotations: {}

# -- Pod labels
podLabels: {}

# -- Node selector
nodeSelector: {}

# -- Tolerations
tolerations: []

# -- Affinity rules
affinity: {}

# -- ServiceAccount name override (default: release name)
serviceAccount:
  name: ""
  annotations: {}

# -- Teleport bot setup hook (runs post-install)
setup:
  # -- Enable the post-install/post-upgrade hook Job
  enabled: true
  # -- Label selector to find the Teleport auth pod
  teleportAuthSelector: "app=teleport"
  # -- Container name inside the auth pod that has tctl
  teleportAuthContainer: "teleport"
  # -- kubectl image for the hook job
  kubectlImage:
    repository: alpine/kubectl
    tag: 1.35.2

